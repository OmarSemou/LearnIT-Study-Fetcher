services:
  - type: web
    name: learnit-study
    env: python
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn learnit_study.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LEARNIT_OUTPUT_DIR
        value: /tmp/learnit-output
      - key: LEARNIT_WEB_PASSWORD
        sync: false
      - key: LEARNIT_WEB_SECRET_KEY
        sync: false
